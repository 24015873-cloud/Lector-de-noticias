<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Noticias</title>

<link rel="stylesheet" href="style.css">

</head>

<body id="appBody">

<header class="header">

<h1>Portal de Noticias</h1>

<div class="controls">

<input type="text" id="searchInput" placeholder="Buscar noticia...">

<button id="refreshBtn">Actualizar</button>

</div>

<div class="categories">

<button class="category-btn active" data-category="all">Todas</button>
<button class="category-btn" data-category="mundo">Mundo</button>
<button class="category-btn" data-category="mexico">México</button>
<button class="category-btn" data-category="ciencia">Ciencia</button>
<button class="category-btn" data-category="cultura">Cultura</button>
<button class="category-btn" data-category="salud">Salud</button>

</div>

</header>

<main>

<div id="statusMessage">Cargando noticias...</div>

<div id="newsGrid" class="news-grid"></div>

</main>

<script src="app.js"></script>

</body>
</html>
