<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOTIweb'</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="styles.css">

</head>


<body id="appBody" class="theme-professional min-h-screen">

<!-- HEADER -->
<header class="header-bg text-white shadow-xl sticky top-0 z-50">
  <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
    
    <div class="flex items-center gap-3">
      <!-- Reemplazamos el emoji por el bloque del icono SVG -->
      <div class="logo-box bg-white/20 p-2 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
        </svg>
      </div>

      <h1 class="text-xl font-black uppercase tracking-tighter">
        NotiWeb
      </h1>
    </div>

    <div class="mt-4 md:mt-0 flex gap-2">
      <input
        type="text"
        id="searchInput"
        placeholder="Buscar noticia..."
        class="px-4 py-2 rounded text-gray-800 w-48 md:w-64"
      />
      <button
        id="refreshBtn"
        class="accent-btn px-6 py-2 rounded text-xs font-black uppercase"
      >
        Actualizar
      </button>
    </div>

  </div>
</header>


<!-- CAMBIO DE TEMA -->

<div class="container mx-auto px-4 pt-6 flex justify-center md:justify-end gap-3 items-center">

<span class="text-xs opacity-50 uppercase">
Tema
</span>

<button id="btn-prof" class="theme-btn bg-blue-700"></button>
<button id="btn-mod" class="theme-btn bg-teal-600"></button>
<button id="btn-dark" class="theme-btn bg-black"></button>

</div>


<!-- SLIDER DESTACADO -->

<section class="container mx-auto px-4 py-8">

<div class="slider">

<img
id="sliderImg"
src="https://ichef.bbci.co.uk/ace/ws/800/cpsprodpb/4730/live/ef3437a0-1f1f-11f1-a600-6bf0292beaaf.jpg.webp"
/>

<div class="slider-text">

<h2>Noticias destacadas</h2>

</div>

</div>

</section>


<!-- CONTENIDO -->

<main class="container mx-auto px-4 py-8">

<!-- CATEGORIAS -->

<div class="flex flex-wrap gap-3 mb-10 justify-center">

<button class="category-btn cat-all" data-category="all">
Todas
</button>

<button class="category-btn cat-ciencia" data-category="ciencia">
Ciencia
</button>

<button class="category-btn cat-mundo" data-category="mundo">
Mundo
</button>

<button class="category-btn cat-mexico" data-category="mexico">
México
</button>

<button class="category-btn cat-salud" data-category="salud">
Salud
</button>

<button class="category-btn cat-cultura" data-category="cultura">
Cultura
</button>

</div>
<!-- MENSAJE CARGA -->

<div id="statusMessage" class="text-center mb-6 hidden">

<div class="loader">
Cargando noticias...
</div>

</div>


<!-- GRID NOTICIAS -->

<div
id="newsGrid"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
></div>

</main>


<!-- FOOTER -->

<footer class="footer">

<p>
© 2026 NOTIweb / Copyright Angel Balleza
</p>

</footer>


<script src="script.js"></script>

</body>
</html>
