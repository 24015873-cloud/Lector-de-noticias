<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notiweb - </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vinculación del archivo CSS externo -->
    <link rel="stylesheet" href="styles.css">
</head>
<body id="appBody" class="theme-professional min-h-screen">

    <!-- Encabezado de la página -->
    <header class="text-white shadow-xl sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewbox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                    </svg>
                </div>
                <h1 class="text-xl font-black tracking-tighter uppercase">Notiweb</h1>
            </div>
            
            <div class="mt-4 md:mt-0 flex gap-2">
                <input type="text" id="searchInput" placeholder="Buscar en la tarea..." class="px-4 py-2 rounded text-gray-800 focus:outline-none focus:ring-2 focus:ring-white/50 w-48 md:w-64">
                <button id="refreshBtn" class="accent-btn px-6 py-2 rounded font-bold uppercase text-xs tracking-widest transition-transform active:scale-95">
                    Actualizar
                </button>
            </div>
        </div>
    </header>

    <!-- Selector de Temas Visuales -->
    <div class="container mx-auto px-4 pt-6 flex justify-center md:justify-end gap-3 items-center">
        <span class="text-[10px] uppercase font-bold opacity-50 tracking-widest mr-2">Estilo de lectura:</span>
        <button id="btn-prof" class="w-8 h-8 rounded-full bg-blue-700 border-2 border-white shadow-sm"></button>
        <button id="btn-mod" class="w-8 h-8 rounded-full bg-teal-600 border-2 border-white shadow-sm"></button>
        <button id="btn-dark" class="w-8 h-8 rounded-full bg-slate-900 border-2 border-white shadow-sm"></button>
    </div>

    <!-- Contenido Principal -->
    <main class="container mx-auto px-4 py-8">
        <!-- Filtros por Categoría -->
        <div class="flex flex-wrap gap-2 mb-10 justify-center">
            <button class="category-btn accent-btn px-5 py-2 rounded-full text-sm font-medium" data-category="all">Todas</button>
            <button class="category-btn bg-white/50 border border-gray-300 px-5 py-2 rounded-full text-sm hover:bg-white transition-all" data-category="educacion">Educación</button>
            <button class="category-btn bg-white/50 border border-gray-300 px-5 py-2 rounded-full text-sm hover:bg-white transition-all" data-category="ciencia">Ciencia</button>
            <button class="category-btn bg-white/50 border border-gray-300 px-5 py-2 rounded-full text-sm hover:bg-white transition-all" data-category="mexico">México</button>
            <button class="category-btn bg-white/50 border border-gray-300 px-5 py-2 rounded-full text-sm hover:bg-white transition-all" data-category="mundo">Mundo</button>
        </div>

        <!-- Mensaje de Carga -->
        <div id="statusMessage" class="text-center mb-6 hidden">
            <div class="inline-flex items-center px-4 py-2 font-semibold leading-6 text-sm shadow rounded-md text-white bg-indigo-500">
                <div class="animate-spin h-4 w-4 mr-3 border-2 border-white border-t-transparent rounded-full"></div>
                Cargando notas de interés...
            </div>
        </div>

        <!-- Cuadrícula de Noticias -->
        <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <!-- Pie de página -->
    <footer class="bg-black/10 py-12 mt-12 text-center border-t border-gray-200">
        <div class="container mx-auto px-4">
            <p class="text-sm font-black opacity-75 uppercase tracking-tighter">&copy; 2026 NOTIweb - Derechos de Autor :Angel Balleza</p>
        </div>
    </footer>

    <!-- Vinculación del archivo JS externo -->
    <script src="script.js"></script>
</body>
</html>
