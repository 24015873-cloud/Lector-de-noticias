<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotiWeb Ultra Premium</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 'citrus-yellow': '#DFFF00', 'premium-dark': '#0a0a0a' }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body id="appBody" class="bg-slate-50 text-slate-900 transition-colors duration-500">

    <!-- Cursor Premium -->
    <div id="custom-cursor" aria-hidden="true"></div>
    
    <!-- Capas de Fondo -->
    <div class="bg-glow" aria-hidden="true">
        <div class="orb bg-blue-600 w-96 h-96 top-0 left-0"></div>
        <div class="orb bg-purple-500 w-80 h-80 bottom-0 right-0" style="animation-delay: -5s;"></div>
    </div>

    <!-- Header Original -->
    <header id="mainHeader" class="text-white shadow-2xl sticky top-0 z-50 transition-all duration-500 backdrop-blur-md bg-blue-700/90 py-4 dark:bg-blue-900/90">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center">
            <button class="flex items-center gap-4 group" onclick="window.location.reload()">
                <div class="bg-white/10 p-3 rounded-2xl backdrop-blur-xl border border-white/20 transition-all group-hover:rotate-[360deg] group-hover:scale-110">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-citrus-yellow" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                    </svg>
                </div>
                <div class="text-left">
                    <h1 class="text-3xl font-black tracking-tighter uppercase leading-none">Noti<span class="text-citrus-yellow">Web</span></h1>
                    <span class="text-[10px] uppercase tracking-[0.4em] opacity-60 font-bold">Ultra Premium</span>
                </div>
            </button>
            
            <div class="mt-6 md:mt-0 flex gap-3">
                <div class="relative">
                    <input type="text" id="searchInput" placeholder="Explorar noticias..." class="bg-white/10 border border-white/20 px-6 py-3 rounded-2xl text-white placeholder:text-white/50 focus:ring-4 focus:ring-citrus-yellow/30 outline-none w-64 md:w-80 transition-all">
                </div>
                <button onclick="fetchNews('all', event)" class="bg-citrus-yellow text-blue-900 px-6 py-3 rounded-2xl font-black uppercase text-xs tracking-widest hover:scale-105 active:scale-95 transition-all shadow-lg">
                    Buscar
                </button>
            </div>
        </div>
    </header>

    <!-- Carrusel -->
    <section class="container mx-auto px-6 mt-8 overflow-hidden relative group">
        <div class="flex items-center gap-2 mb-4">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
            </span>
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-slate-500 dark:text-slate-400">Tendencias</h2>
        </div>
        <div class="relative bg-slate-200/50 dark:bg-premium-dark/50 rounded-[3rem] p-2 overflow-hidden border border-white dark:border-white/5 shadow-xl">
            <div id="carouselTrack" class="carousel-track"></div>
            <button onclick="moveCarousel(-1)" class="carousel-btn left-6">←</button>
            <button onclick="moveCarousel(1)" class="carousel-btn right-6">→</button>
        </div>
    </section>

    <!-- Float Theme Toggle -->
    <div class="fixed right-6 bottom-6 z-[100] flex flex-col gap-3">
        <button onclick="toggleDarkMode(false)" class="theme-btn bg-blue-600">☀️</button>
        <button onclick="toggleDarkMode(true)" class="theme-btn bg-premium-dark">🌙</button>
    </div>

    <main class="container mx-auto px-6 py-12">
        <!-- Navegación con Emojis (Lógica en Script) -->
        <nav class="flex flex-wrap gap-3 mb-16 justify-center" id="categoryNav">
            <button class="category-btn active" data-category="all">GLOBAL</button>
            <button class="category-btn" data-category="salud">SALUD</button>
            <button class="category-btn" data-category="ciencia">CIENCIA</button>
            <button class="category-btn" data-category="mexico">MÉXICO</button>
            <button class="category-btn" data-category="mundo">MUNDO</button>
            <button class="category-btn" data-category="cultura">CULTURA</button>
        </nav>

        <section id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12"></section>
    </main>

    <footer class="py-20 text-center opacity-40">
        <p class="text-[10px] font-black uppercase tracking-[0.5em] dark:text-white">&copy; 2026 NOTIWEB ULTIMATE EDITION</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
